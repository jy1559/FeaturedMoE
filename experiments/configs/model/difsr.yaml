# @package _global_
# DIF-SR - Decoupled Side Information Fusion for Sequential Recommendation

model: DIFSR

hidden_size: 128
embedding_size: 128
num_layers: 2
num_heads: 4
inner_size: 256
hidden_dropout_prob: 0.1
loss_type: CE

# Side-info fields from item metadata.
# `category` exists in feature_added_v4/*.item and is used by default.
selected_features: [category]
attribute_hidden_size: 128
fusion_type: sum

search:
  num_layers: [1, 2, 3]
  num_heads: [2, 4, 8]
  fusion_type: [sum, gate]
