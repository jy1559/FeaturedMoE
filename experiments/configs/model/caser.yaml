# @package _global_
# Caser - Convolutional Sequence Embedding Recommendation

model: Caser

# Caser is expensive with long sequences (CNN over length L).
MAX_ITEM_LIST_LENGTH: 10

num_filters: 16
filter_sizes: [2, 3, 4]

search:
  num_filters: [8, 16, 32]
  filter_sizes: [[2, 3], [2, 3, 4]]
  MAX_ITEM_LIST_LENGTH: [5, 10]
