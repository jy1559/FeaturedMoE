# @package _global_
# FEARec - Frequency Enhanced Hybrid Attention for Sequential Recommendation

model: FEARec

hidden_size: 128
embedding_size: 128
n_layers: 2
n_heads: 4
inner_size: 256
hidden_dropout_prob: 0.1
attn_dropout_prob: 0.1
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: CE

# Contrastive and frequency options
lmd: 0.1
lmd_sem: 0.1
tau: 1.0
contrast: us_x
sim: dot
fredom: false
fredom_type: null
global_ratio: 1
dual_domain: false
std: false
spatial_ratio: 0
topk_factor: 1

search:
  n_layers: [1, 2, 3]
  n_heads: [2, 4, 8]
