# @package _global_
# FeaturedMoE: layout-based interleaved Stage-MoE + Transformer

model: FeaturedMoE_HiR
# Active run defaults alignment (run/fmoe_hir/tune_hparam_hir.sh).
MAX_ITEM_LIST_LENGTH: 10

# Load engineered features from feature_added_v2 .inter files.
load_col:
  inter: [session_id, item_id, timestamp,
    mac_user_level, mac_sess_gap, mac_is_new, mac_hist_len,
    mac_time_sin, mac_time_cos, mac_is_weekend, mac_hist_speed,
    mac_hist_ent, mac_hist_uniq_r, mac_hist_top1, mac_hist_switch_r,
    mac_hist_pop_avg, mac_hist_pop_std,
    mid_win_ent, mid_win_top1, mid_int_std, mid_sess_time,
    mid_pop_avg, mid_win_switch, mid_int_avg, mid_accel, mid_last_dev,
    mid_valid_r, mid_novel_r, mid_uniq_item_r, mid_uniq_cat_r, mid_max_run,
    mid_pop_drift, mid_ent_drift,
    mic_last_int, mic_short_avg, mic_short_std, mic_valid_r,
    mic_switch, mic_uniq_c, mic_cat_ent, mic_cat_top1,
    mic_is_recons, mic_uniq_i, mic_recons_r, mic_max_run_i,
    mic_pop_avg, mic_pop_std, mic_pop_drift, mic_pop_ent]

# --- Dimensions ---
embedding_size: 128
hidden_size: 64
d_feat_emb: 16
d_expert_hidden: 256
d_router_hidden: 64
expert_scale: 4

# --- Layout / Attention budget ---
# layout tuple: [n_pre_layer, n_pre_macro, n_pre_mid, n_pre_micro, n_post_layer]
# stage depth: -1=bypass, 0=MoE-only, >=1=pre-attn depth + stage MoE
num_layers: 3
arch_layout_catalog:
  - [0, 1, 1, 1, 0]
arch_layout_id: 0

# Deprecated depth aliases (layout-first이므로 실제 실행은 arch_layout_id가 우선)
# 로그/레거시 호환을 위해 유지하며 단계적으로 축소 대상.
n_pre_layer: 2
n_pre_macro: 0
n_pre_mid: 0
n_pre_micro: 0
n_post_layer: 0

# --- Transformer ---
num_heads: 8
hidden_dropout_prob: 0.1
# d_ff: 0  # 0 = auto (4 * embedding_size)

# --- Runtime speed knobs ---
eval_every: 1
enable_tf32: true
enable_cudnn_benchmark: false

# --- MoE input toggles (common) ---
router_use_hidden: true
router_use_feature: true
expert_use_hidden: true
expert_use_feature: true

# --- MoE routing (common) ---
moe_top_k: 0
moe_top_k_policy: auto
moe_top_k_ratio: 0.5
moe_top_k_min: 1

# --- HiR-only routing/merge ---
bundle_top_k: 0
stage_merge_mode: serial         # serial | parallel
parallel_stage_gate_top_k: 0
hir_use_bundle_aux_loss: true
hir_bundle_aux_lambda_scale: 1.0
macro_routing_scope: session
macro_session_pooling: query
mid_router_temperature: 1.3
micro_router_temperature: 1.3
mid_router_feature_dropout: 0.1
micro_router_feature_dropout: 0.1
use_valid_ratio_gating: true

# --- Optional schedule (epoch-based stability warm-up; default OFF) ---
fmoe_schedule_enable: false
alpha_warmup_until: 0
alpha_warmup_start: 0.0
alpha_warmup_end: 1.0
temperature_warmup_until: 0
mid_router_temperature_start: 1.3
micro_router_temperature_start: 1.3
moe_top_k_start: 0
moe_top_k_warmup_until: 0
fmoe_schedule_log_every_epoch: 1

# --- Auxiliary loss ---
use_aux_loss: true
balance_loss_lambda: 0.01

# --- Optional: MoE-FFN in global post transformer ---
ffn_moe: false
n_ffn_experts: 4
ffn_top_k: 0

# --- Logging / optimization ---
fmoe_debug_logging: false
learning_rate: 0.0005
analysis_sample_rate: 0.2
analysis_n_bins: 5
wandb_project: FMoE_hir
wandb_project_hyperopt: FMoE_hir

# --- Optional search defaults (mainly for quick local tuning) ---
search:
  # Layout / structural
  arch_layout_id: [0]
  num_heads: [8]
  MAX_ITEM_LIST_LENGTH: [10]

  # Representation
  hidden_size: [64]
  d_feat_emb: [16]
  d_expert_hidden: [256]
  d_router_hidden: [64]
  expert_scale: [4]

  # Optimization
  learning_rate: [4e-4, 1.5e-2]
  weight_decay: [0.0, 1.0e-5]
  hidden_dropout_prob: [0.05, 0.2]
  balance_loss_lambda: [0.0005, 0.1]

  # Routing (common + HiR-only)
  moe_top_k: [0]
  moe_top_k_policy: [auto]
  moe_top_k_ratio: [0.5]
  bundle_top_k: [0]
  stage_merge_mode: [serial]
  parallel_stage_gate_top_k: [0]
  hir_use_bundle_aux_loss: [true]
  hir_bundle_aux_lambda_scale: [1.0]
  macro_routing_scope: [session]
  macro_session_pooling: [query]
  mid_router_temperature: [1.3]
  micro_router_temperature: [1.3]
  mid_router_feature_dropout: [0.1]
  micro_router_feature_dropout: [0.1]
  use_valid_ratio_gating: [true]

  # Schedule (kept fixed by default; enable via CLI for ablation)
  fmoe_schedule_enable: [false]
