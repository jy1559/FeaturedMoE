# @package _global_
# DuoRec - Contrastive Learning for Representation Degeneration in Sequential Recommendation

model: DuoRec

hidden_size: 128
embedding_size: 128
n_layers: 2
n_heads: 4
inner_size: 256
hidden_dropout_prob: 0.1
attn_dropout_prob: 0.1
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: CE

# Contrastive settings
lmd: 0.1
lmd_sem: 0.1
tau: 1.0
contrast: us_x
sim: dot

search:
  n_layers: [1, 2, 3]
  n_heads: [2, 4, 8]
