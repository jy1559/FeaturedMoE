# @package _global_
# FeaturedMoE_HiR2 tuning config

model: FeaturedMoE_HiR2
MAX_ITEM_LIST_LENGTH: 10

load_col:
  inter: [session_id, item_id, timestamp,
    mac_user_level, mac_sess_gap, mac_is_new, mac_hist_len,
    mac_time_sin, mac_time_cos, mac_is_weekend, mac_hist_speed,
    mac_hist_ent, mac_hist_uniq_r, mac_hist_top1, mac_hist_switch_r,
    mac_hist_pop_avg, mac_hist_pop_std,
    mid_win_ent, mid_win_top1, mid_int_std, mid_sess_time,
    mid_pop_avg, mid_win_switch, mid_int_avg, mid_accel, mid_last_dev,
    mid_valid_r, mid_novel_r, mid_uniq_item_r, mid_uniq_cat_r, mid_max_run,
    mid_pop_drift, mid_ent_drift,
    mic_last_int, mic_short_avg, mic_short_std, mic_valid_r,
    mic_switch, mic_uniq_c, mic_cat_ent, mic_cat_top1,
    mic_is_recons, mic_uniq_i, mic_recons_r, mic_max_run_i,
    mic_pop_avg, mic_pop_std, mic_pop_drift, mic_pop_ent]

# Core dimensions
embedding_size: 128
num_heads: 8
hidden_dropout_prob: 0.1
d_ff: 0
d_feat_emb: 16
d_expert_hidden: 128
d_router_hidden: 64
expert_scale: 3

# Optional transformer depth
hir2_global_pre_layers: 0
hir2_global_post_layers: 0
hir2_macro_pre_layers: 0
hir2_mid_pre_layers: 0
hir2_micro_pre_layers: 0

# Stage-first merge mode
hir2_stage_merge_mode: serial_weighted

# Session-level stage allocator
hir2_stage_allocator_top_k: 0
hir2_stage_allocator_temperature: 1.0
hir2_stage_allocator_pooling: query
hir2_stage_allocator_use_hidden: true
hir2_stage_allocator_use_feature: true

# Stage expert routing
router_use_hidden: true
router_use_feature: true
expert_use_hidden: true
expert_use_feature: true
moe_top_k: 0
macro_router_temperature: 1.0
mid_router_temperature: 1.3
micro_router_temperature: 1.3
mid_router_feature_dropout: 0.1
micro_router_feature_dropout: 0.1
use_valid_ratio_gating: true

# Loss / regularization
use_aux_loss: true
balance_loss_lambda: 0.01
hir2_stage_alloc_aux_scale: 1.0
hir2_stage_entropy_aux_lambda: 0.0
hir2_stage_weight_floor: 0.0
hir2_stage_delta_scale: 1.0

# Optional FFN-MoE
ffn_moe: false
n_ffn_experts: 4
ffn_top_k: 0

fmoe_debug_logging: false
learning_rate: 0.001

search:
  # structure axis
  hir2_stage_merge_mode: [serial_weighted, parallel_weighted]
  hir2_stage_allocator_top_k: [0, 1, 2]
  hir2_stage_allocator_temperature: [0.8, 1.0, 1.2]
  hir2_stage_allocator_pooling: [query, mean]
  hir2_stage_allocator_use_hidden: [true]
  hir2_stage_allocator_use_feature: [true]

  # model dims
  embedding_size: [128]
  num_heads: [8]
  d_feat_emb: [16, 32]
  d_expert_hidden: [128, 192]
  d_router_hidden: [64, 96]
  expert_scale: [2, 3]

  # optimization
  learning_rate: [1e-4, 3e-2]
  weight_decay: [0.0, 1.0e-6, 1.0e-5, 1.0e-4]
  hidden_dropout_prob: [0.05, 0.2]
  balance_loss_lambda: [0.0005, 0.1]
  hir2_stage_entropy_aux_lambda: [0.0, 5.0e-4, 1.0e-3, 3.0e-3]
  hir2_stage_weight_floor: [0.0, 0.05, 0.1]
  hir2_stage_delta_scale: [1.0, 1.5, 2.0]

  # routing
  moe_top_k: [0, 2]
  macro_router_temperature: [1.0]
  mid_router_temperature: [1.3]
  micro_router_temperature: [1.3]
  mid_router_feature_dropout: [0.1]
  micro_router_feature_dropout: [0.1]
  use_valid_ratio_gating: [true]
