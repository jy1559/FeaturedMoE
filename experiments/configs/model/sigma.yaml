# @package _global_
# SIGMA - Selective Gated Mamba for Sequential Recommendation

model: SIGMA

hidden_size: 128
embedding_size: 128
num_layers: 2
inner_size: 256
state_size: 16
conv_kernel: 4
remaining_ratio: 0.5
hidden_dropout_prob: 0.1
loss_type: CE

search:
  num_layers: [1, 2]
  state_size: [16, 32]
  remaining_ratio: [0.3, 0.5, 0.7]
  conv_kernel: [4, 8, 16]
