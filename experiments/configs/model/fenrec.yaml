# @package _global_
# FENRec - Feature-Enhanced Sequential Recommendation

model: FENRec

num_layers: 2
num_heads: 2
hidden_size: 128
embedding_size: 128
inner_size: 256
hidden_dropout_prob: 0.1

cl_weight: 0.1
cl_temperature: 0.2
aug_dropout_prob: 0.1
loss_type: CE

search:
  num_layers: [1, 2, 3]
  cl_weight: [0.05, 0.1, 0.2]
  cl_temperature: [0.1, 0.2, 0.5]
