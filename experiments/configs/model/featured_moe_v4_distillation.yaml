routing_common:
  router_use_hidden: true
  router_use_feature: true
  expert_use_hidden: true
  expert_use_feature: true
  router_impl: learned
  router_impl_by_stage: {}
  router_design: flat_legacy
  router_group_bias_scale: 0.5
  router_clone_residual_scale: 0.20
  rule_router:
    variant: ratio_bins
    n_bins: 5
    feature_per_expert: 4
    custom_stage_feature_map: {}
    expert_bias: {}
  moe_top_k: 0
  moe_top_k_policy: auto
  moe_top_k_ratio: 0.5
  moe_top_k_min: 1
  macro_routing_scope: session
  macro_session_pooling: query
  mid_router_temperature: 1.3
  micro_router_temperature: 1.3
  mid_router_feature_dropout: 0.1
  micro_router_feature_dropout: 0.1
  use_valid_ratio_gating: true

parallel_merge:
  fmoe_v2_parallel_stage_gate_top_k: 0
  fmoe_v2_parallel_stage_gate_temperature: 1.0

schedule:
  fmoe_schedule_enable: false
  alpha_warmup_until: 0
  alpha_warmup_start: 0.0
  alpha_warmup_end: 1.0
  temperature_warmup_until: 0
  mid_router_temperature_start: 1.3
  micro_router_temperature_start: 1.3
  moe_top_k_start: 0
  moe_top_k_warmup_until: 0
  fmoe_schedule_log_every_epoch: 1

loss_regularization:
  use_aux_loss: true
  balance_loss_lambda: 0.005
  fmoe_v2_stage_merge_aux_enable: false
  fmoe_v2_stage_merge_aux_lambda_scale: 1.0
  fmoe_v2_feature_spec_aux_enable: false
  fmoe_v2_feature_spec_aux_lambda: 0.0
  fmoe_v2_feature_spec_stages: [mid, micro]
  fmoe_v2_feature_spec_min_tokens: 16
  teacher_design: none
  teacher_delivery: none
  teacher_stage_mask: all
  teacher_kl_lambda: 0.0
  teacher_bias_scale: 0.0
  teacher_temperature: 1.5
  teacher_until: 0.25
  teacher_stat_sharpness: 16.0

runtime:
  fmoe_debug_logging: false
  ffn_moe: false
  n_ffn_experts: 4
  ffn_top_k: 0

learning_rate: 0.0012

search:
  fmoe_v2_layout_id: [7]
  fmoe_stage_execution_mode: [serial]
  embedding_size: [128]
  num_heads: [8]
  d_feat_emb: [16]
  d_expert_hidden: [256]
  d_router_hidden: [64]
  expert_scale: [3]
  router_impl: [learned]
  router_impl_by_stage: [{}]
  router_design: [flat_legacy]
  router_group_bias_scale: [0.5]
  router_clone_residual_scale: [0.20]
  rule_router.n_bins: [5]
  rule_router.variant: [ratio_bins]
  rule_router.feature_per_expert: [4]
  learning_rate: [6e-4, 9e-4, 1.2e-3, 1.6e-3, 2.1e-3, 2.8e-3, 3.6e-3, 4.8e-3]
  weight_decay: [5.0e-5]
  hidden_dropout_prob: [0.10]
  balance_loss_lambda: [0.005]
  moe_top_k: [0]
  moe_top_k_policy: [auto]
  moe_top_k_ratio: [0.5]
  fmoe_schedule_enable: [false]
  fmoe_v2_feature_spec_aux_enable: [false]
  fmoe_v2_feature_spec_aux_lambda: [0.0]
  teacher_design: [none]
  teacher_delivery: [none]
  teacher_stage_mask: [all]
  teacher_kl_lambda: [0.0]
  teacher_bias_scale: [0.0]
  teacher_temperature: [1.5]
  teacher_until: [0.25]
  teacher_stat_sharpness: [16.0]
