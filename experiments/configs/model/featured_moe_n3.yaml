# @package _global_

model: FeaturedMoE_N3
MAX_ITEM_LIST_LENGTH: 10

load_col:
  inter: [
    session_id, item_id, timestamp,
    mac5_ctx_valid_r, mac5_gap_last, mac5_pace_mean, mac5_pace_trend,
    mac5_theme_ent_mean, mac5_theme_top1_mean, mac5_theme_repeat_r, mac5_theme_shift_r,
    mac5_repeat_mean, mac5_adj_cat_overlap_mean, mac5_adj_item_overlap_mean, mac5_repeat_trend,
    mac5_pop_mean, mac5_pop_std_mean, mac5_pop_ent_mean, mac5_pop_trend,
    mac10_ctx_valid_r, mac10_gap_last, mac10_pace_mean, mac10_pace_trend,
    mac10_theme_ent_mean, mac10_theme_top1_mean, mac10_theme_repeat_r, mac10_theme_shift_r,
    mac10_repeat_mean, mac10_adj_cat_overlap_mean, mac10_adj_item_overlap_mean, mac10_repeat_trend,
    mac10_pop_mean, mac10_pop_std_mean, mac10_pop_ent_mean, mac10_pop_trend,
    mid_valid_r, mid_int_mean, mid_int_std, mid_sess_age,
    mid_cat_ent, mid_cat_top1, mid_cat_switch_r, mid_cat_uniq_r,
    mid_item_uniq_r, mid_repeat_r, mid_novel_r, mid_max_run_i,
    mid_pop_mean, mid_pop_std, mid_pop_ent, mid_pop_trend,
    mic_valid_r, mic_last_gap, mic_gap_mean, mic_gap_delta_vs_mid,
    mic_cat_switch_now, mic_last_cat_mismatch_r, mic_suffix_cat_ent, mic_suffix_cat_uniq_r,
    mic_is_recons, mic_suffix_recons_r, mic_suffix_uniq_i, mic_suffix_max_run_i,
    mic_last_pop, mic_suffix_pop_std, mic_suffix_pop_ent, mic_pop_delta_vs_mid
  ]

model_core:
  embedding_size: 128
  num_heads: 4
  hidden_dropout_prob: 0.1
  attn_dropout_prob: 0.1
  d_ff: 0
  d_feat_emb: 16
  d_expert_hidden: 128
  d_router_hidden: 64
  expert_scale: 1
  hidden_act: gelu
  layer_norm_eps: 1.0e-12

num_heads: 4
hidden_dropout_prob: 0.1
attn_dropout_prob: 0.1
d_ff: 0
d_expert_hidden: 128
d_router_hidden: 64
expert_scale: 1
hidden_act: gelu
layer_norm_eps: 1.0e-12
router_use_hidden: true
router_use_feature: true
expert_use_hidden: true
expert_use_feature: true
router_impl: learned
router_impl_by_stage: {}
router_design: simple_flat
feature_encoder_mode: linear
feature_encoder_sinusoidal_features: ["*time*", "*gap*", "*int*", "*pop*", "*valid_r*"]
feature_encoder_sinusoidal_n_freqs: 4
moe_top_k: 0
moe_top_k_policy: auto
moe_top_k_ratio: 0.5
moe_top_k_min: 1
macro_session_pooling: mean
layer_layout: [layer, layer, layer]
stage_router_granularity:
  macro: session
  mid: session
  micro: token
stage_feature_encoder_mode:
  macro: linear
  mid: linear
  micro: linear
stage_compute_mode:
  macro: moe
  mid: moe
  micro: moe
stage_router_mode:
  macro: learned
  mid: learned
  micro: learned
stage_router_source:
  macro: both
  mid: both
  micro: both
stage_feature_injection:
  macro: none
  mid: none
  micro: none
mid_router_temperature: 1.2
micro_router_temperature: 1.2
use_valid_ratio_gating: false
fmoe_schedule_enable: false
alpha_warmup_until: 0
alpha_warmup_start: 0.0
alpha_warmup_end: 1.0
temperature_warmup_until: 0
mid_router_temperature_start: 1.2
micro_router_temperature_start: 1.2
moe_top_k_start: 0
moe_top_k_warmup_until: 0
balance_loss_lambda: 0.002
z_loss_lambda: 0.0
gate_entropy_lambda: 0.0
gate_entropy_until: 0.0
fmoe_v2_stage_merge_aux_enable: false
fmoe_v2_stage_merge_aux_lambda_scale: 1.0

dense_hidden_scale: 1.0
macro_history_window: 5
stage_feature_family_mask: {}
rule_agreement_lambda: 0.0
group_coverage_lambda: 0.0
group_prior_align_lambda: 0.0
feature_group_bias_lambda: 0.0
feature_group_prior_temperature: 1.0
factored_group_balance_lambda: 0.0
stage_router_type:
  macro: standard
  mid: standard
  micro: standard
fmoe_special_logging: true
fmoe_diag_logging: true
fmoe_eval_logging_timing: final_only
fmoe_feature_ablation_logging: false
fmoe_feature_family_ablation_logging: true
fmoe_artifact_logging_policy: combo_best
fmoe_probe_snapshot_enable: true
fmoe_diag_sample_sessions: 256

fmoe_v2_layout_id: 0
fmoe_stage_execution_mode: serial

lr_scheduler_type: none
lr_scheduler_warmup_ratio: 0.0
lr_scheduler_min_lr_ratio: 0.1
lr_scheduler_plateau_factor: 0.5
lr_scheduler_plateau_patience: 3
