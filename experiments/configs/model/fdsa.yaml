# @package _global_
# FDSA - Feature-level Deeper Self-Attention Network for Sequential Recommendation

model: FDSA

hidden_size: 128
embedding_size: 128
n_layers: 2
n_heads: 4
inner_size: 256
hidden_dropout_prob: 0.1
attn_dropout_prob: 0.1
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: CE

# Side-info fields from item metadata.
# `category` exists in feature_added_v4/*.item and is a safe default.
selected_features: [category]
pooling_mode: mean

search:
  n_layers: [1, 2, 3]
  n_heads: [2, 4, 8]
