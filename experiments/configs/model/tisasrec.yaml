# @package _global_
# TiSASRec - Time Interval Aware Self-Attentive Sequential Recommendation

model: TiSASRec

hidden_size: 128
embedding_size: 128
n_layers: 2
n_heads: 4
inner_size: 256
hidden_dropout_prob: 0.1
initializer_range: 0.02
loss_type: CE

# Max relative time bucket used in time-interval attention
time_span: 256

search:
  n_layers: [1, 2, 3]
  n_heads: [2, 4, 8]
  time_span: [64, 128, 256]
