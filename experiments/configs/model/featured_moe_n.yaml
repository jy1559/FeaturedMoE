# @package _global_
# FeaturedMoE_N default config (lightweight shared-feature-bank FMoE)

model: FeaturedMoE_N
MAX_ITEM_LIST_LENGTH: 10

load_col:
  inter: [session_id, item_id, timestamp,
    mac_user_level, mac_sess_gap, mac_is_new, mac_hist_len,
    mac_time_sin, mac_time_cos, mac_is_weekend, mac_hist_speed,
    mac_hist_ent, mac_hist_uniq_r, mac_hist_top1, mac_hist_switch_r,
    mac_hist_pop_avg, mac_hist_pop_std,
    mid_win_ent, mid_win_top1, mid_int_std, mid_sess_time,
    mid_pop_avg, mid_win_switch, mid_int_avg, mid_accel, mid_last_dev,
    mid_valid_r, mid_novel_r, mid_uniq_item_r, mid_uniq_cat_r, mid_max_run,
    mid_pop_drift, mid_ent_drift,
    mic_last_int, mic_short_avg, mic_short_std, mic_valid_r,
    mic_switch, mic_uniq_c, mic_cat_ent, mic_cat_top1,
    mic_is_recons, mic_uniq_i, mic_recons_r, mic_max_run_i,
    mic_pop_avg, mic_pop_std, mic_pop_drift, mic_pop_ent]

model_core:
  embedding_size: 128
  num_heads: 8
  hidden_dropout_prob: 0.1
  d_ff: 0
  d_feat_emb: 16
  d_expert_hidden: 128
  d_router_hidden: 64
  expert_scale: 1

# Root aliases override generic config.yaml defaults for direct Hydra compose.
num_heads: 8
hidden_dropout_prob: 0.1
d_expert_hidden: 128
expert_scale: 1
router_use_hidden: true
router_use_feature: true
expert_use_hidden: true
expert_use_feature: true
router_impl: learned
router_impl_by_stage: {}
router_design: simple_flat
stage_inter_layer_style: attn
moe_block_variant: moe
router_group_feature_mode: none
moe_top_k: 1
moe_top_k_policy: fixed
moe_top_k_ratio: 0.5
moe_top_k_min: 1
macro_routing_scope: session
macro_session_pooling: mean
mid_router_temperature: 1.2
micro_router_temperature: 1.2
mid_router_feature_dropout: 0.0
micro_router_feature_dropout: 0.0
use_valid_ratio_gating: true
fmoe_schedule_enable: true
alpha_warmup_until: 0
alpha_warmup_start: 0.0
alpha_warmup_end: 1.0
temperature_warmup_until: 0.3
mid_router_temperature_start: 1.6
micro_router_temperature_start: 1.6
moe_top_k_start: 1
moe_top_k_warmup_until: 0
balance_loss_lambda: 0.002
z_loss_lambda: 0.0
gate_entropy_lambda: 0.0
gate_entropy_until: 0.0
fmoe_v2_stage_merge_aux_enable: false
fmoe_v2_stage_merge_aux_lambda_scale: 1.0

