routing_common:
  router_use_hidden: true
  router_use_feature: true
  expert_use_hidden: true
  expert_use_feature: true
  router_impl: learned
  router_impl_by_stage: {}
  router_design: simple_flat
  rule_router:
    variant: ratio_bins
    n_bins: 5
    feature_per_expert: 4
    custom_stage_feature_map: {}
    expert_bias: {}
  moe_top_k: 1
  moe_top_k_policy: fixed
  moe_top_k_ratio: 0.5
  moe_top_k_min: 1
  macro_routing_scope: session
  macro_session_pooling: mean
  mid_router_temperature: 1.2
  micro_router_temperature: 1.2
  mid_router_feature_dropout: 0.0
  micro_router_feature_dropout: 0.0
  use_valid_ratio_gating: true

feature_encoder_mode: linear
feature_encoder_sinusoidal_features: ["*time*", "*gap*", "*int*", "*pop*", "*valid_r*"]
feature_encoder_sinusoidal_n_freqs: 4
rule_bias_scale: 0.0
fmoe_special_logging: true
expert_hidden_by_stage: {}
expert_depth_by_stage: {}

parallel_merge:
  fmoe_v2_parallel_stage_gate_top_k: 0
  fmoe_v2_parallel_stage_gate_temperature: 1.0

schedule:
  fmoe_schedule_enable: true
  alpha_warmup_until: 0
  alpha_warmup_start: 0.0
  alpha_warmup_end: 1.0
  temperature_warmup_until: 0.3
  mid_router_temperature_start: 1.6
  micro_router_temperature_start: 1.6
  moe_top_k_start: 1
  moe_top_k_warmup_until: 0
  fmoe_schedule_log_every_epoch: 1

loss_regularization:
  use_aux_loss: true
  balance_loss_lambda: 0.002
  fmoe_v2_stage_merge_aux_enable: false
  fmoe_v2_stage_merge_aux_lambda_scale: 1.0
  z_loss_lambda: 0.0

runtime:
  fmoe_debug_logging: false
  ffn_moe: false
  n_ffn_experts: 4
  ffn_top_k: 0

learning_rate: 0.0005

search_space_type_overrides:
  learning_rate: choice
  weight_decay: choice

search:
  fmoe_v2_layout_id: [7]
  fmoe_stage_execution_mode: [serial]
  router_design: [simple_flat]
  embedding_size: [128]
  num_heads: [8]
  d_feat_emb: [16]
  d_expert_hidden: [96, 128]
  d_router_hidden: [64]
  expert_scale: [1]
  router_impl: [learned]
  router_impl_by_stage: [{}]
  rule_router.n_bins: [5]
  rule_router.feature_per_expert: [4]
  feature_encoder_mode: [linear, sinusoidal_selected]
  feature_encoder_sinusoidal_n_freqs: [4]
  rule_bias_scale: [0.0, 0.15, 0.30]
  learning_rate: [4e-4, 1.5e-2]
  weight_decay: [0.0, 1.0e-5]
  hidden_dropout_prob: [0.08, 0.12]
  balance_loss_lambda: [0.001, 0.002, 0.004]
  moe_top_k: [1]
  moe_top_k_policy: [fixed]
  moe_top_k_ratio: [0.5]
  fmoe_schedule_enable: [true]
  fmoe_special_logging: [true]
